<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOVA Shop — Checkout</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/checkout.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">NOVA<span>.</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Shop</a>
  </div>
  <div class="nav-actions"></div>
</nav>

<div class="checkout-container">
  <div class="checkout-left">
    <h2>Checkout</h2>
    <div class="checkout-steps">
      <div class="step active" id="step1-tab">1. Shipping</div>
      <div class="step" id="step2-tab">2. Payment</div>
      <div class="step" id="step3-tab">3. Review</div>
    </div>

    <!-- STEP 1: SHIPPING -->
    <div class="step-content" id="step1">
      <h3>Shipping Information</h3>
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="fname" placeholder="John"/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="lname" placeholder="Doe"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="john@example.com"/>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="address" placeholder="123 Main Street"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" id="city" placeholder="New York"/>
        </div>
        <div class="form-group">
          <label>ZIP Code</label>
          <input type="text" id="zip" placeholder="10001"/>
        </div>
      </div>
      <div class="form-group">
        <label>Country</label>
        <select id="country">
          <option>United States</option>
          <option>India</option>
          <option>United Kingdom</option>
          <option>Canada</option>
          <option>Australia</option>
        </select>
      </div>
      <button class="btn-primary" onclick="goToStep(2)">Continue to Payment <i class="fas fa-arrow-right"></i></button>
    </div>

    <!-- STEP 2: PAYMENT -->
    <div class="step-content" id="step2" style="display:none;">
      <h3>Payment Details</h3>
      <div class="payment-methods">
        <label class="pay-option active">
          <input type="radio" name="payment" value="card" checked/> <i class="fas fa-credit-card"></i> Credit / Debit Card
        </label>
        <label class="pay-option">
          <input type="radio" name="payment" value="paypal"/> <i class="fab fa-paypal"></i> PayPal
        </label>
        <label class="pay-option">
          <input type="radio" name="payment" value="upi"/> <i class="fas fa-mobile-alt"></i> UPI
        </label>
      </div>
      <div class="form-group">
        <label>Card Number</label>
        <input type="text" placeholder="1234 5678 9012 3456" maxlength="19" id="card-number" oninput="formatCard(this)"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Expiry Date</label>
          <input type="text" placeholder="MM/YY" maxlength="5" id="expiry" oninput="formatExpiry(this)"/>
        </div>
        <div class="form-group">
          <label>CVV</label>
          <input type="password" placeholder="•••" maxlength="3"/>
        </div>
      </div>
      <div class="form-group">
        <label>Name on Card</label>
        <input type="text" placeholder="John Doe"/>
      </div>
      <div class="btn-row">
        <button class="btn-outline" onclick="goToStep(1)"><i class="fas fa-arrow-left"></i> Back</button>
        <button class="btn-primary" onclick="goToStep(3)">Review Order <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>

    <!-- STEP 3: REVIEW -->
    <div class="step-content" id="step3" style="display:none;">
      <h3>Review Your Order</h3>
      <div id="review-items"></div>
      <div class="btn-row">
        <button class="btn-outline" onclick="goToStep(2)"><i class="fas fa-arrow-left"></i> Back</button>
        <button class="btn-primary btn-place" onclick="placeOrder()">Place Order <i class="fas fa-check"></i></button>
      </div>
    </div>
  </div>

  <!-- ORDER SUMMARY -->
  <div class="checkout-right">
    <h3>Order Summary</h3>
    <div id="order-summary-items"></div>
    <div class="summary-line"><span>Subtotal</span><span id="summary-sub">$0.00</span></div>
    <div class="summary-line"><span>Shipping</span><span class="text-green">Free</span></div>
    <div class="summary-line summary-total"><span>Total</span><strong id="summary-total">$0.00</strong></div>
    <div class="promo-box">
      <input type="text" placeholder="Promo code" id="promo-code"/>
      <button onclick="applyPromo()">Apply</button>
    </div>
    <p id="promo-msg" style="font-size:13px;margin-top:8px;"></p>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="success-modal" style="display:none;">
  <div class="modal-box">
    <div class="success-icon"><i class="fas fa-check-circle"></i></div>
    <h2>Order Placed!</h2>
    <p>Thank you for your purchase. Your order has been confirmed.</p>
    <p class="order-id">Order ID: <strong id="order-id-text"></strong></p>
    <a href="index.html" class="btn-primary">Continue Shopping</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
